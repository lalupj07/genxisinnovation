<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>GenXis Innovations</title>
    <script>
        // GitHub Pages SPA redirect trick.
        // When GitHub Pages hits a 404 (any non-root route), it serves this file.
        // We encode the full path into a query string and redirect to index.html,
        // which then decodes it and pushes the correct route via replaceState.
        var seg = 1; // Number of path segments to keep (1 = keep root)
        var l = window.location;
        var path = l.pathname.slice(1).split('/').slice(seg).join('/');
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
            (path ? path + '/' : '') +
            l.search.slice(1).replace(/&/g, '~and~') +
            (l.hash ? '&hash=' + l.hash.slice(1) : '')
        );
    </script>
</head>

<body>
    <p>Redirecting...</p>
</body>

</html>
